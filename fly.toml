# fly.toml app configuration file generated for pureskin-etudiant-cool-cherry-2146 on 2026-03-13T14:56:37+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pureskin-etudiant-cool-cherry-2146'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/actuator/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
