# =============================================
# CONFIGURATION PURESKIN ÉTUDIANT - DÉPLOIEMENT RENDER
# =============================================

spring.application.name=pureskin-etudiant-backend

# Configuration serveur
server.port=${PORT:8080}
server.address=0.0.0.0

# =============================================
# BASE DE DONNÉES POSTGRESQL
# =============================================
# La DATABASE_URL sera fournie par Render automatiquement
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pureSkin}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# CONFIGURATION JPA/HIBERNATE
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# =============================================
# CONFIGURATION CORS
# =============================================
spring.web.cors.allowed-origins=https://pureskin-frontend.vercel.app,https://pureskin-frontend-git-username.vercel.app,http://localhost:3000,http://localhost:3001,http://localhost:3002,https://pureskin-etudiant-green-smoke-3920.fly.dev
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,HEAD,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# =============================================
# CONFIGURATION FAROTY API
# =============================================
faroty.api.url=https://api-pay-prod.faroty.me/payments/api/v1
faroty.api.key=${FAROTY_API_KEY:fk_live_mhZG1htEBgK02jvI5QZqNYTpzgdfFmMCisI8cho4KbxqSD9uq2l6h39XppRSayQVTtAj5pCAjRU}
faroty.wallet.id=${FAROTY_WALLET_ID:9c3cdf3b-ff0b-44d9-8aa0-4e638c88f660}
faroty.withdrawal.refId=${FAROTY_WITHDRAWAL_REF_ID:c173d45d-4787-4f52-8e46-d7320ea43a76}

# =============================================
# LOGGING CONFIGURATION
# =============================================
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http=DEBUG
logging.level.com.pureskin.etudiant=DEBUG

# =============================================
# ACTUATOR CONFIGURATION
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.probes.enabled=true
