# =============================================
# CONFIGURATION DÉPLOIEMENT RENDER - PURESKIN ÉTUDIANT
# =============================================

services:
  # =============================================
  # SERVICE BACKEND (SPRING BOOT)
  # =============================================
  - type: web
    name: pureskin-backend
    runtime: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    envVars:
      # Base de données PostgreSQL
      - key: DATABASE_URL
        fromDatabase:
          name: pureskin-db
          property: connectionString
      - key: DB_USERNAME
        value: postgres
      - key: DB_PASSWORD
        fromDatabase:
          name: pureskin-db
          property: password
      
      # API Faroty
      - key: FAROTY_API_KEY
        value: fk_live_mhZG1htEBgK02jvI5QZqNYTpzgdfFmMCisI8cho4KbxqSD9uq2l6h39XppRSayQVTtAj5pCAjRU
      
      # Configuration serveur
      - key: PORT
        value: 8080
    
    # Health check pour Render
    healthCheckPath: /actuator/health
    
    # Configuration du dépôt
    repo: https://github.com/votre-username/pureskin-etudiant.git
    rootDir: backend
    branch: main

# =============================================
# BASE DE DONNÉES POSTGRESQL
# =============================================
databases:
  - name: pureskin-db
    databaseName: pureSkin
    user: postgres
    plan: free
    # Configuration pour l'import des données
    postgresMajorVersion: 15
