services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: pureskin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pureSkin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data_final.sql:/docker-entrypoint-initdb.d/data_final.sql
    networks:
      - pureskin-network

  # Backend Spring Boot uniquement
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.simple
    container_name: pureskin-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pureSkin
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_WEB_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pureskin-network

volumes:
  postgres_data:
    driver: local

networks:
  pureskin-network:
    driver: bridge
